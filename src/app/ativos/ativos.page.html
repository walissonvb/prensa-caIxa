<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>ativos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">ativos</ion-title>
    </ion-toolbar>
  </ion-header>
<svg width="100%" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" style="max-width: 100%; height: auto;">
<!-- Estrutura -->
  <rect x="80" y="60" width="1040" height="45" rx="8" fill="#2C3E50" stroke="#34495E" stroke-width="18"/>
  <rect x="80" y="75" width="1040" height="20" fill="#34495E"/>
 <!-- sistema de força -->
  <rect x="80" y="180" width="120" height="80" fill="#2C3E50"/>
<ng-container *ngFor="let m of modulos">
  <rect
    [attr.x]="baseX + (m * espaco)"
    y="170"
    width="65"
    height="175"
    rx="6"
    fill="#ECF0F1"
    stroke="#2C3E50"
    stroke-width="14"
  />

  <rect
    [attr.x]="baseX + (m * espaco) + 19"
    y="120"
    width="28"
    height="95"
    rx="4"
    fill="#E74C3C"
    stroke="#2C3E50"
    stroke-width="10"
  />

</ng-container>
 <!-- estrutura inferior -->
  <rect x="110" y="355" width="980" height="28" fill="#2C3E50" rx="4"/>
  <rect x="110" y="370" width="980" height="12" fill="#34495E"/>

  <text x="600" y="35" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2C3E50" text-anchor="middle">Prensa Sacmi - Louça Sanitária</text>

  <!-- Legenda simples -->
</svg>
</ion-content>
