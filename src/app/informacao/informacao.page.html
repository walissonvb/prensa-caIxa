<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="backPage()">
        <ion-icon name="arrow-back"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Informações do Molde</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding page-informacao">

  @for (item of prensaFiltrada; track $index) {
    <ion-card class="molde-card">
      <ion-card-header>
        <ion-card-title>Molde {{ item.codigo }}</ion-card-title>
        <ion-card-subtitle>Local: {{ item.local }}</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <ion-item class="molde-item">
          <ion-label><strong>Atuador:</strong> {{ item.Atuador }}</ion-label>
          <ion-button class="btn-ia" slot="end" fill="outline" (click)="consultarIA(item, 'Atuador', item.Atuador)">
            IA
          </ion-button>
        </ion-item>

        <ion-item class="molde-item">
          <ion-label><strong>Mancal GLA:</strong> {{ item.MancalGLA }}</ion-label>
          <ion-button class="btn-ia" slot="end" fill="outline" (click)="consultarIA(item, 'Mancal GLA', item.MancalGLA)">
            IA
          </ion-button>
        </ion-item>

        <ion-item class="molde-item">
          <ion-label><strong>Válvulas:</strong> {{ item.Valvulas }}</ion-label>
          <ion-button class="btn-ia" slot="end" fill="outline" (click)="consultarIA(item, 'Válvulas', item.Valvulas)">
            IA
          </ion-button>
        </ion-item>

        <!-- Pergunta livre -->
        <ion-item lines="none" class="ion-margin-top">
          <ion-input class="input-pergunta"
            [(ngModel)]="perguntaLivre"
            placeholder="Digite sua pergunta para a IA..."
            clearInput>
          </ion-input>
        </ion-item>

        <ion-button expand="block" color="primary"
                    class="btn-perguntar"
                    (click)="perguntarLivre(item)"
                    [disabled]="!perguntaLivre.trim()">
          <ion-icon name="sparkles"></ion-icon>
          Perguntar à IA
        </ion-button>
      </ion-card-content>
    </ion-card>
  }

</ion-content>
